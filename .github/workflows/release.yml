name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: "Build on ${{ matrix.os }}"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus CLI
        shell: bash
        run: |
          if ! command -v dx &> /dev/null; then
            curl -sSL https://dioxus.dev/install.sh | bash
          fi

      - name: Bundle for Linux
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          dx bundle --linux \
          --package-types "appimage" \
          --package-types "deb" \
          --package-types "rpm" \
          --release \
          --json-output \
          --verbose \
          | tail -1 \
          | jq -r '.json | fromjson | .BundleOutput.bundles []' > bundles.txt

      - name: Bundle for MacOS
        shell: bash
        if: matrix.os == 'macos-latest'
        run: |
          dx bundle --macos \
          --package-types "macos" \
          --package-types "dmg" \
          --release \
          --json-output \
          --verbose \
          | tail -1 \
          | jq -r '.json | fromjson | .BundleOutput.bundles []' > bundles.txt

      - name: Bundle for Windows
        shell: bash
        if: matrix.os == 'windows-latest'
        run: |
          dx bundle --windows \
          --package-types "msi" \
          --release \
          --json-output \
          --verbose \
          | tail -1 \
          | jq -r '.json | fromjson | .BundleOutput.bundles []' > bundles.txt

      - name: Parse Bundle Paths
        id: parse_paths
        shell: bash
        run: |
          echo "UPLOAD_PATHS<<EOF" >> $GITHUB_ENV
          cat bundles.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-build
          path: ${{ env.UPLOAD_PATHS }}

  release:
    name: "Create release"
    runs-on: "ubuntu-latest"
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release

      - name: Print build artifcats
        run: ls -R ./release

      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: |
            ./release/**/*
