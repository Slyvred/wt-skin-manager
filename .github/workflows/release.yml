name: Release

on:
  workflow_dispatch
  # push:
  #   branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install tooling
        run: |
          curl -sSL https://dioxus.dev/install.sh | bash
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Bundle
        run: |
          dx bundle --desktop \
          --package-types "appimage" \
          --package-types "deb" \
          --package-types "rpm" \
          --release \
          --json-output \
          --verbose \
          | tail -1 \
          | jq -r '.json | fromjson | .BundleOutput.bundles []' > bundles.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux build
          path: |
            $(cat bundles.txt)
